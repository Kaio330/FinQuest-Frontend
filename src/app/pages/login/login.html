<app-default-login-layout>
  <div class="logo-header">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    <h1 class="logo-text">Fin<span>Quest</span></h1>
    <p class="subtitle">Inicie sessão para continuar a sua jornada financeira.</p>
  </div>

  <form class="login-form">

    <div class="input-group">
      <label>E-mail</label>
      <div class="input-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <input type="email" placeholder="nome@exemplo.com" required>
      </div>
    </div>

    <div class="input-group">
      <div class="label-row">
        <label>Palavra-passe</label>
        <a href="#" class="forgot-link">Esqueceu-se?</a>
      </div>
      <div class="input-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" placeholder="••••••••" required>
      </div>
    </div>

    <button type="submit" class="btn-primary">
      Entrar na Conta
    </button>
  </form>

  <div class="social-divider">
    <div class="line"></div>
    <span>Ou continuar com</span>
    <div class="line"></div>
  </div>

  <div class="social-buttons">
    <button class="btn-social">Google</button>
    <button class="btn-social">GitHub</button>
  </div>

  <p class="register-footer">
    Ainda não tem conta? <a href="#">Comece a jogar agora</a>
  </p>
</app-default-login-layout>
