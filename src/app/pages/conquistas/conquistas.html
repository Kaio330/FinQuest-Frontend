<app-dashboard-layout>
  <div class="conquistas-container">
    <h2 style="color: #fff">Minhas Conquistas</h2>

    <div *ngIf="loading" class="loading">Carregando conquistas...</div>
    <div *ngIf="error" class="error">{{ error }}</div>

    <div class="conquistas-grid" *ngIf="!loading && !error">
      <div class="conquista-card" *ngFor="let conquista of conquistas" [class.bloqueada]="!conquista.desbloqueada">
        <div class="icon">
          <!-- Placeholder SVG icon -->
          <svg *ngIf="conquista.desbloqueada" viewBox="0 0 24 24" width="48" height="48" fill="gold">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <svg *ngIf="!conquista.desbloqueada" viewBox="0 0 24 24" width="48" height="48" fill="gray">
             <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
          </svg>
        </div>
        <h3>{{ conquista.nome }}</h3>
        <p>{{ conquista.descricao }}</p>
        <span class="status">{{ conquista.desbloqueada ? 'Desbloqueada' : 'Bloqueada' }}</span>
      </div>
    </div>
  </div>
</app-dashboard-layout>
