<header class="dashboard-header">
  <div class="header-titles">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
  </div>
  <div class="header-actions">
    <div class="coins-badge">
      <span class="coin-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" fill="#F1C40F"/>
          <path d="M12 7V17M10 9H14M10 15H14" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <span>1250</span>
    </div>
    <div class="user-level">
      <div class="level-info">
        <span class="level-text">NÍVEL 5</span>
        <span class="xp-text">2450 / 3000 XP</span>
      </div>
      <div class="avatar">
        <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Samuel" alt="User Avatar" />
        <span class="level-badge">5</span>
      </div>
    </div>
  </div>
</header>
