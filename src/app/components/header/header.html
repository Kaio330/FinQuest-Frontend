<header class="dashboard-header">
  <div class="header-titles">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
  </div>
  <div class="header-actions" *ngIf="jogador">
    <div class="user-level">
      <div class="level-info">
        <span class="level-text">NÍVEL {{ jogador.nivelAtual || 1 }}</span>
        <div class="progress-bar-container">
          <div class="progress-bar-fill"
               [style.width.%]="((jogador.xpPlayer || 0) / ((jogador.nivelAtual || 1) * 100)) * 100">
          </div>
        </div>
        <span class="xp-text">
          {{ jogador.xpPlayer || 0 }} / {{ (jogador.nivelAtual || 1) * 100 }} XP
        </span>
      </div>
      <div class="avatar">
        <img [src]="'https://api.dicebear.com/9.x/avataaars/svg?seed=' + (jogador.nomePlayer || 'User')"
             alt="User Avatar" />
        <span class="level-badge">{{ jogador.nivelAtual || 1 }}</span>
      </div>
    </div>
  </div>
</header>
