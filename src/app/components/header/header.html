<header class="dashboard-header">
  <div class="header-titles">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
  </div>
  <div class="header-actions">
    <div class="coins-badge">
      <span class="coin-icon">💰</span>
      <span>1250</span>
    </div>
    <div class="user-level">
      <div class="level-info">
        <span class="level-text">NÍVEL 5</span>
        <span class="xp-text">2450 / 3000 XP</span>
      </div>
      <div class="avatar">
        <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Samuel" alt="User Avatar" />
        <span class="level-badge">5</span>
      </div>
    </div>
  </div>
</header>
